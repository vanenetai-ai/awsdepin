<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - AWS DePIN</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-wrap { max-width: 960px; margin: 0 auto; padding: 32px 20px; }
        .admin-wrap h1 { margin-bottom: 24px; }
        .admin-login { max-width: 400px; margin: 120px auto; }
        .admin-login .card { padding: 32px; text-align: center; }
        .admin-login h2 { margin-bottom: 16px; }
        .section { margin-bottom: 32px; }
        .section h3 { margin-bottom: 12px; font-size: 18px; }
        .bot-status { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .dot.on { background: var(--green); }
        .dot.off { background: var(--red); }
        .inline-form { display: flex; gap: 8px; align-items: end; }
        .inline-form input { flex: 1; }
    </style>
</head>
<body style="display:block; background:var(--bg); color:var(--text);">

<div id="login-view" class="admin-login">
    <div class="card">
        <h2>🔒 管理员登录</h2>
        <form onsubmit="doLogin(event)">
            <div class="form-group">
                <label>管理员密码</label>
                <input type="password" id="admin-pwd" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">登录</button>
        </form>
        <p id="login-err" style="color:var(--red);margin-top:12px;display:none"></p>
    </div>
</div>

<div id="admin-view" class="admin-wrap" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center">
        <h1>⚙️ 管理后台</h1>
        <button class="btn btn-secondary" onclick="adminLogout()">退出</button>
    </div>

    <!-- Stats -->
    <div class="section">
        <h3>📊 系统概览</h3>
        <div class="stats-grid" id="admin-stats"></div>
    </div>

    <!-- Bot Config -->
    <div class="section">
        <h3>🤖 Telegram Bot 配置</h3>
        <div class="bot-status" id="bot-status"></div>
        <div class="inline-form">
            <div class="form-group" style="flex:1;margin:0">
                <input type="text" id="bot-token-input" placeholder="输入 Bot Token (例: 123456:ABC-DEF...)">
            </div>
            <button class="btn btn-primary" onclick="verifyBot()">验证</button>
            <button class="btn btn-secondary" onclick="saveBot()">保存并启动</button>
            <button class="btn btn-danger" onclick="removeBot()">移除</button>
        </div>
        <p id="bot-verify-result" style="margin-top:8px;font-size:13px;color:var(--text2)"></p>
    </div>

    <!-- Users -->
    <div class="section">
        <h3>👥 用户管理</h3>
        <div class="table-wrap">
            <table id="users-table">
                <thead>
                    <tr>
                        <th>ID</th><th>Telegram</th><th>用户名</th><th>显示名</th>
                        <th>AWS账号数</th><th>状态</th><th>注册时间</th><th>最后登录</th><th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
const ADMIN_API = '/api/admin';
let adminPwd = localStorage.getItem('admin_pwd') || '';

function toast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = 'toast toast-' + type;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => el.remove(), 3500);
}

async function adminApi(path, opts = {}) {
    const headers = { 'Content-Type': 'application/json', 'X-Admin-Password': adminPwd, ...opts.headers };
    const res = await fetch(ADMIN_API + path, { ...opts, headers });
    if (res.status === 403) { adminLogout(); throw new Error('密码错误'); }
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.detail || '请求失败'); }
    return res.json();
}

function doLogin(e) {
    e.preventDefault();
    adminPwd = document.getElementById('admin-pwd').value;
    fetch(ADMIN_API + '/login?password=' + encodeURIComponent(adminPwd), { method: 'POST' })
        .then(r => { if (!r.ok) throw new Error('密码错误'); return r.json(); })
        .then(() => {
            localStorage.setItem('admin_pwd', adminPwd);
            showAdmin();
        })
        .catch(err => {
            document.getElementById('login-err').style.display = 'block';
            document.getElementById('login-err').textContent = err.message;
        });
}

function adminLogout() {
    localStorage.removeItem('admin_pwd');
    adminPwd = '';
    document.getElementById('login-view').style.display = '';
    document.getElementById('admin-view').style.display = 'none';
}

function showAdmin() {
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('admin-view').style.display = '';
    loadStats();
    loadBot();
    loadUsers();
}

async function loadStats() {
    try {
        const d = await adminApi('/stats');
        document.getElementById('admin-stats').innerHTML = `
            <div class="stat-card"><div class="label">用户数</div><div class="value blue">${d.users}</div></div>
            <div class="stat-card"><div class="label">AWS 账号</div><div class="value">${d.accounts}</div></div>
            <div class="stat-card"><div class="label">实例总数</div><div class="value">${d.instances}</div></div>
            <div class="stat-card"><div class="label">运行中</div><div class="value green">${d.instances_running}</div></div>
            <div class="stat-card"><div class="label">任务数</div><div class="value">${d.tasks}</div></div>
        `;
    } catch (e) { toast(e.message, 'error'); }
}

async function loadBot() {
    try {
        const d = await adminApi('/bot');
        document.getElementById('bot-status').innerHTML = d.configured
            ? `<span class="dot on"></span> Bot 已配置 <code>${d.token_masked}</code>`
            : `<span class="dot off"></span> Bot 未配置`;
    } catch (e) { toast(e.message, 'error'); }
}

async function verifyBot() {
    const token = document.getElementById('bot-token-input').value.trim();
    if (!token) return;
    try {
        const r = await adminApi('/bot/verify', { method: 'POST', body: JSON.stringify({ token }) });
        const el = document.getElementById('bot-verify-result');
        el.textContent = r.valid ? `✅ 有效 - @${r.username} (${r.name})` : `❌ 无效: ${r.error}`;
        el.style.color = r.valid ? 'var(--green)' : 'var(--red)';
    } catch (e) { toast(e.message, 'error'); }
}

async function saveBot() {
    const token = document.getElementById('bot-token-input').value.trim();
    if (!token) return toast('请输入 token', 'error');
    try {
        await adminApi('/bot', { method: 'POST', body: JSON.stringify({ token }) });
        toast('Bot 已保存并启动');
        document.getElementById('bot-token-input').value = '';
        document.getElementById('bot-verify-result').textContent = '';
        loadBot();
        loadStats();
    } catch (e) { toast(e.message, 'error'); }
}

async function removeBot() {
    if (!confirm('确定移除 Bot？')) return;
    try {
        await adminApi('/bot', { method: 'POST', body: JSON.stringify({ token: '' }) });
        toast('Bot 已移除');
        loadBot();
        loadStats();
    } catch (e) { toast(e.message, 'error'); }
}

async function loadUsers() {
    try {
        const list = await adminApi('/users');
        document.querySelector('#users-table tbody').innerHTML = list.map(u => `
            <tr>
                <td>${u.id}</td>
                <td>${u.telegram_id}</td>
                <td>${u.telegram_username || '-'}</td>
                <td>${u.display_name}</td>
                <td>${u.account_count}</td>
                <td>
                    <span class="badge ${u.is_active ? 'badge-green' : 'badge-red'}" style="cursor:pointer"
                          onclick="toggleUser(${u.id})">${u.is_active ? '活跃' : '禁用'}</span>
                </td>
                <td>${u.created_at}</td>
                <td>${u.last_login_at || '-'}</td>
                <td class="action-btns">
                    <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">删除</button>
                </td>
            </tr>
        `).join('');
    } catch (e) { toast(e.message, 'error'); }
}

async function toggleUser(id) {
    try {
        const r = await adminApi('/users/' + id + '/toggle', { method: 'PUT' });
        toast(r.is_active ? '用户已启用' : '用户已禁用');
        loadUsers();
    } catch (e) { toast(e.message, 'error'); }
}

async function deleteUser(id) {
    if (!confirm('确定删除此用户及其所有数据？')) return;
    try {
        await adminApi('/users/' + id, { method: 'DELETE' });
        toast('用户已删除');
        loadUsers();
        loadStats();
    } catch (e) { toast(e.message, 'error'); }
}

// Auto-login if password saved
if (adminPwd) {
    fetch(ADMIN_API + '/login?password=' + encodeURIComponent(adminPwd), { method: 'POST' })
        .then(r => { if (r.ok) showAdmin(); })
        .catch(() => {});
}
</script>
</body>
</html>

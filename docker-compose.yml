version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aws-depin-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend/depin_scripts:/app/depin_scripts
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/app.db
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: aws-depin-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

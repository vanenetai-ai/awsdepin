version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: aws-depin-db
    environment:
      POSTGRES_USER: depin
      POSTGRES_PASSWORD: depin123
      POSTGRES_DB: depin
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aws-depin-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://depin:depin123@db:5432/depin
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: aws-depin-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
